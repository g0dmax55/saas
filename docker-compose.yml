services:
  mongodb:
    image: mongo:7
    container_name: subcaps-mongo
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: subcaps123
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  app:
    build: ./frontend
    container_name: subcaps-app
    ports:
      - "3000:3000"
    environment:
      NODE_ENV: development
      MONGODB_URI: mongodb://admin:subcaps123@mongodb:27017/subcaps?authSource=admin
      OPENAI_API_KEY: ${OPENAI_API_KEY:-sk-your-key-here}
      JWT_SECRET: ${JWT_SECRET:-your_jwt_secret_change_this}
    depends_on:
      mongodb:
        condition: service_started
    volumes:
      - ./frontend/public/uploads:/app/public/uploads
    restart: unless-stopped

volumes:
  mongodb_data:
